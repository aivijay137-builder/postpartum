<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Unit Tests — Navya</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; padding: 1.5rem; background: #f5f5f0; color: #1a1a1a; }
    h1 { font-size: 1.25rem; margin: 0 0 .25rem; }
    .meta { font-size: .8125rem; color: #666; margin-bottom: 1.5rem; }
    .suite { margin-bottom: 1.5rem; }
    .suite-name { font-size: .9375rem; font-weight: 700; margin-bottom: .5rem; padding: .375rem .75rem; background: #e8e8e2; border-radius: .5rem; }
    .test { display: flex; align-items: flex-start; gap: .625rem; padding: .4rem .5rem; border-radius: .375rem; font-size: .875rem; margin-bottom: .25rem; }
    .test.pass { background: rgba(52,168,83,.1); }
    .test.fail { background: rgba(186,26,26,.1); }
    .test.skip { background: rgba(0,0,0,.04); color: #888; }
    .badge { font-size: .6875rem; font-weight: 700; padding: .15rem .45rem; border-radius: .25rem; flex-shrink: 0; margin-top: .075rem; }
    .badge.pass { background: #34a853; color: #fff; }
    .badge.fail { background: #ba1a1a; color: #fff; }
    .badge.skip { background: #999; color: #fff; }
    .test-detail { line-height: 1.5; }
    .err-detail { font-size: .8125rem; color: #ba1a1a; margin-top: .125rem; font-family: monospace; }
    .summary { display: flex; gap: 1rem; padding: .875rem 1.125rem; border-radius: .75rem; font-size: .9375rem; font-weight: 600; margin-top: 1.5rem; }
    .summary.all-pass { background: rgba(52,168,83,.12); color: #1e6b3a; }
    .summary.has-fail  { background: rgba(186,26,26,.1);  color: #ba1a1a; }
    .sum-chip { display: flex; align-items: center; gap: .35rem; }
    #dom-sandbox { display: none; }
  </style>
</head>
<body>

<h1>Auth Unit Tests — Navya</h1>
<p class="meta" id="meta">Running…</p>

<div id="results"></div>
<div id="summary"></div>

<!-- Hidden DOM sandbox used by auth.js -->
<div id="dom-sandbox">
  <main id="app-root"></main>
  <nav class="nav-bottom"></nav>
</div>

<!--
  We deliberately do NOT load the real Supabase CDN or supabase.js.
  Instead we mock window._supabaseClient inline below.
-->
<script>
/* ══════════════════════════════════════════════════════════════
   MINI TEST RUNNER
   ══════════════════════════════════════════════════════════════ */
var _suites  = [];
var _current = null;

function describe(name, fn) {
  _current = { name: name, tests: [] };
  _suites.push(_current);
  fn();
  _current = null;
}

function it(label, fn) {
  _current.tests.push({ label: label, fn: fn });
}

function expect(actual) {
  return {
    toBe: function(expected) {
      if (actual !== expected) throw new Error('Expected ' + JSON.stringify(expected) + ' but got ' + JSON.stringify(actual));
    },
    toEqual: function(expected) {
      var a = JSON.stringify(actual), b = JSON.stringify(expected);
      if (a !== b) throw new Error('Expected ' + b + ' but got ' + a);
    },
    toBeTruthy: function() {
      if (!actual) throw new Error('Expected truthy but got ' + JSON.stringify(actual));
    },
    toBeFalsy: function() {
      if (actual) throw new Error('Expected falsy but got ' + JSON.stringify(actual));
    },
    toContain: function(str) {
      if (String(actual).indexOf(str) === -1) throw new Error('Expected string to contain "' + str + '"');
    },
    toBeNull: function() {
      if (actual !== null) throw new Error('Expected null but got ' + JSON.stringify(actual));
    },
    not: {
      toBe: function(expected) {
        if (actual === expected) throw new Error('Expected NOT ' + JSON.stringify(expected));
      },
      toContain: function(str) {
        if (String(actual).indexOf(str) !== -1) throw new Error('Expected string NOT to contain "' + str + '"');
      },
      toBeNull: function() {
        if (actual === null) throw new Error('Expected NOT null');
      }
    }
  };
}

/* ══════════════════════════════════════════════════════════════
   SUPABASE MOCK
   Controls what each Supabase call returns for a given test.
   ══════════════════════════════════════════════════════════════ */
var _mockSessionResult  = null;  // { data: { session: ... }, error: null }
var _mockSignInResult   = null;
var _mockSignUpResult   = null;
var _mockOtpResult      = null;
var _mockSignOutResult  = null;
var _authStateCallback  = null;

window._supabaseClient = {
  auth: {
    getSession: function() {
      return Promise.resolve(_mockSessionResult || { data: { session: null }, error: null });
    },
    signInWithPassword: function() {
      return Promise.resolve(_mockSignInResult || { data: {}, error: { message: 'mock not set' } });
    },
    signUp: function() {
      return Promise.resolve(_mockSignUpResult || { data: {}, error: { message: 'mock not set' } });
    },
    signInWithOtp: function() {
      return Promise.resolve(_mockOtpResult || { data: {}, error: null });
    },
    signOut: function() {
      return Promise.resolve(_mockSignOutResult || {});
    },
    onAuthStateChange: function(cb) {
      _authStateCallback = cb;
      return { data: { subscription: { unsubscribe: function(){} } } };
    }
  }
};

/* Expose app.js globals expected by auth.js _resumeApp */
window.notifMgr        = null;
window.obData          = {};
window.obStep          = 1;
window.allCards        = [];
window.mealPlan        = [];
window.showOnboarding  = function() {};  // stub
window.route           = function() {};  // stub
window.getCurrentDay   = function() { return 1; };

/* Minimal DB stub */
window.DB = {
  getNotifPrefs: function() { return {}; },
  get: function() { return null; }
};

/* Minimal NotifManager stub */
window.NotifManager = function() {};
NotifManager.prototype.restoreFromPrefs = function() {};
NotifManager.prototype.clearFeedReminder    = function() {};
NotifManager.prototype.clearCheckinReminder = function() {};

/* ── helpers to inject inputs into the sandbox ── */
function injectInput(id, type, value) {
  var input = document.createElement('input');
  input.id    = id;
  input.type  = type;
  input.value = value || '';
  document.getElementById('app-root').appendChild(input);
}

function clearSandbox() {
  var root = document.getElementById('app-root');
  root.innerHTML = '';
}

function getErrorText() {
  var el = document.getElementById('auth-error-text');
  return el ? el.textContent : '';
}

function isErrorVisible() {
  var el = document.getElementById('auth-error');
  return el ? el.style.display !== 'none' : false;
}
</script>

<!-- Load the module under test AFTER mocks are in place -->
<script src="auth.js"></script>

<script>
/* ══════════════════════════════════════════════════════════════
   TEST SUITES
   ══════════════════════════════════════════════════════════════ */

/* ─── Suite 1: _clearLocalData ─────────────────────────────── */
describe('_clearLocalData', function() {

  it('removes all navya_ prefixed keys', function() {
    localStorage.setItem('navya_uid',       'user-123');
    localStorage.setItem('navya_onboarded', '1');
    localStorage.setItem('navya_profile',   '{}');
    localStorage.setItem('other_key',       'keep-me');

    Auth._clearLocalData();

    expect(localStorage.getItem('navya_uid')).toBeNull();
    expect(localStorage.getItem('navya_onboarded')).toBeNull();
    expect(localStorage.getItem('navya_profile')).toBeNull();
    expect(localStorage.getItem('other_key')).toBe('keep-me');

    localStorage.removeItem('other_key');
  });

  it('does not throw when localStorage is empty', function() {
    localStorage.clear();
    Auth._clearLocalData(); // should not throw
    expect(localStorage.length).toBe(0);
  });
});

/* ─── Suite 2: showAuthScreen — DOM rendering ───────────────── */
describe('showAuthScreen', function() {

  it('signin mode renders email and password inputs', function() {
    Auth.showAuthScreen('signin');
    var root = document.getElementById('app-root').innerHTML;
    expect(root).toContain('auth-email');
    expect(root).toContain('auth-password');
    expect(root).toContain('Sign in');
  });

  it('signup mode renders first-name input', function() {
    Auth.showAuthScreen('signup');
    var root = document.getElementById('app-root').innerHTML;
    expect(root).toContain('auth-name');
    expect(root).toContain('Create account');
  });

  it('magic_sent mode renders inbox message', function() {
    Auth.showAuthScreen('magic_sent');
    var root = document.getElementById('app-root').innerHTML;
    expect(root).toContain('Check your inbox');
  });

  it('confirm_sent mode renders confirmation message', function() {
    Auth.showAuthScreen('confirm_sent');
    var root = document.getElementById('app-root').innerHTML;
    expect(root).toContain('Confirm your email');
  });

  it('hides bottom nav when auth screen is shown', function() {
    Auth.showAuthScreen('signin');
    var nav = document.querySelector('.nav-bottom');
    expect(nav.style.display).toBe('none');
  });
});

/* ─── Suite 3: _togglePw ────────────────────────────────────── */
describe('_togglePw', function() {

  it('toggles password input from hidden to visible', function() {
    Auth.showAuthScreen('signin');
    var input = document.getElementById('auth-password');
    expect(input.type).toBe('password');
    Auth._togglePw();
    expect(input.type).toBe('text');
  });

  it('toggles password input back to hidden', function() {
    Auth.showAuthScreen('signin');
    Auth._togglePw(); // → text
    Auth._togglePw(); // → password
    var input = document.getElementById('auth-password');
    expect(input.type).toBe('password');
  });

  it('updates the eye icon text', function() {
    Auth.showAuthScreen('signin');
    Auth._togglePw();
    var icon = document.getElementById('auth-pw-icon');
    expect(icon.textContent).toBe('visibility_off');
    Auth._togglePw();
    expect(icon.textContent).toBe('visibility');
  });
});

/* ─── Suite 4: _handleSubmit — input validation ─────────────── */
describe('_handleSubmit (validation — no network calls)', function() {

  it('shows error when email is empty', function() {
    Auth.showAuthScreen('signin');
    // leave email blank, fill password
    document.getElementById('auth-email').value    = '';
    document.getElementById('auth-password').value = 'password123';
    Auth._handleSubmit();
    expect(isErrorVisible()).toBeTruthy();
    expect(getErrorText()).toContain('email');
  });

  it('shows error when password is empty', function() {
    Auth.showAuthScreen('signin');
    document.getElementById('auth-email').value    = 'test@example.com';
    document.getElementById('auth-password').value = '';
    Auth._handleSubmit();
    expect(isErrorVisible()).toBeTruthy();
    expect(getErrorText()).toContain('password');
  });

  it('shows error on signup when password shorter than 8 chars', function() {
    Auth.showAuthScreen('signup');
    document.getElementById('auth-email').value    = 'test@example.com';
    document.getElementById('auth-password').value = 'short';
    Auth._handleSubmit();
    expect(isErrorVisible()).toBeTruthy();
    expect(getErrorText()).toContain('8');
  });

  it('does NOT show validation error when both fields are filled on signin', function() {
    // Mock a successful sign-in so the call completes without rejecting
    _mockSignInResult = { data: { session: { user: { id: 'uid-1' } } }, error: null };
    Auth.showAuthScreen('signin');
    document.getElementById('auth-email').value    = 'test@example.com';
    document.getElementById('auth-password').value = 'validpassword';
    Auth._handleSubmit();
    expect(isErrorVisible()).toBeFalsy();
  });
});

/* ─── Suite 5: _handleMagicLink — validation ────────────────── */
describe('_handleMagicLink (validation)', function() {

  it('shows error when email is empty', function() {
    Auth.showAuthScreen('signin');
    document.getElementById('auth-email').value = '';
    Auth._handleMagicLink();
    expect(isErrorVisible()).toBeTruthy();
    expect(getErrorText()).toContain('email');
  });

  it('sends OTP and shows magic_sent screen when email is provided', function(done) {
    _mockOtpResult = { data: {}, error: null };
    Auth.showAuthScreen('signin');
    document.getElementById('auth-email').value = 'test@example.com';
    Auth._handleMagicLink();
    // OTP call is async — check after microtask settles
    setTimeout(function() {
      var root = document.getElementById('app-root').innerHTML;
      expect(root).toContain('Check your inbox');
      if (done) done();
    }, 50);
  });

  it('shows error when OTP call returns an error', function(done) {
    _mockOtpResult = { data: {}, error: { message: 'Rate limit exceeded' } };
    Auth.showAuthScreen('signin');
    document.getElementById('auth-email').value = 'test@example.com';
    Auth._handleMagicLink();
    setTimeout(function() {
      expect(isErrorVisible()).toBeTruthy();
      if (done) done();
    }, 50);
  });
});

/* ─── Suite 6: _onSignedIn ──────────────────────────────────── */
describe('_onSignedIn', function() {

  it('stores the user id in localStorage', function() {
    localStorage.clear();
    Auth._onSignedIn({ user: { id: 'uid-abc' } });
    expect(localStorage.getItem('navya_uid')).toBe('uid-abc');
  });

  it('clears navya data when a different user signs in', function() {
    localStorage.setItem('navya_uid',       'uid-old');
    localStorage.setItem('navya_onboarded', '1');
    localStorage.setItem('navya_profile',   '{"name":"Old"}');

    Auth._onSignedIn({ user: { id: 'uid-new' } });

    expect(localStorage.getItem('navya_profile')).toBeNull();
    expect(localStorage.getItem('navya_uid')).toBe('uid-new');
  });

  it('preserves navya data when the same user signs in again', function() {
    localStorage.setItem('navya_uid',       'uid-same');
    localStorage.setItem('navya_onboarded', '1');
    localStorage.setItem('navya_profile',   '{"name":"Priya"}');

    Auth._onSignedIn({ user: { id: 'uid-same' } });

    expect(localStorage.getItem('navya_profile')).toBe('{"name":"Priya"}');
  });
});

/* ─── Suite 7: signOut ──────────────────────────────────────── */
describe('signOut', function() {

  it('clears navya localStorage keys after sign-out', function(done) {
    _mockSignOutResult = {};
    localStorage.setItem('navya_uid',       'uid-x');
    localStorage.setItem('navya_onboarded', '1');

    Auth.signOut();

    setTimeout(function() {
      expect(localStorage.getItem('navya_uid')).toBeNull();
      expect(localStorage.getItem('navya_onboarded')).toBeNull();
      if (done) done();
    }, 50);
  });

  it('shows the sign-in auth screen after sign-out', function(done) {
    _mockSignOutResult = {};
    Auth.signOut();
    setTimeout(function() {
      var root = document.getElementById('app-root').innerHTML;
      expect(root).toContain('Sign in');
      if (done) done();
    }, 50);
  });
});

/* ─── Suite 8: init — session handling ─────────────────────── */
describe('init', function() {

  it('shows auth screen when there is no existing session', function(done) {
    _mockSessionResult = { data: { session: null }, error: null };
    clearSandbox();

    Auth.init();
    setTimeout(function() {
      var root = document.getElementById('app-root').innerHTML;
      expect(root).toContain('Sign in');
      if (done) done();
    }, 100);
  });

  it('proceeds to app when a valid session exists', function(done) {
    localStorage.setItem('navya_uid',       'uid-init');
    localStorage.setItem('navya_onboarded', '1');
    _mockSessionResult = { data: { session: { user: { id: 'uid-init' } } }, error: null };

    var routeCalled = false;
    window.route = function() { routeCalled = true; };

    Auth.init();
    setTimeout(function() {
      expect(routeCalled).toBeTruthy();
      window.route = function() {};  // restore stub
      if (done) done();
    }, 100);
  });

  it('shows auth screen when Supabase getSession throws', function(done) {
    var orig = window._supabaseClient.auth.getSession;
    window._supabaseClient.auth.getSession = function() { return Promise.reject(new Error('network')); };
    clearSandbox();

    Auth.init();
    setTimeout(function() {
      var root = document.getElementById('app-root').innerHTML;
      expect(root).toContain('Sign in');
      window._supabaseClient.auth.getSession = orig;  // restore
      if (done) done();
    }, 100);
  });
});


/* ══════════════════════════════════════════════════════════════
   RUNNER  — executes all registered suites
   ══════════════════════════════════════════════════════════════ */
(async function runAll() {
  var totalPass = 0, totalFail = 0, totalSkip = 0;
  var html = '';

  for (var s = 0; s < _suites.length; s++) {
    var suite = _suites[s];
    html += '<div class="suite"><div class="suite-name">' + suite.name + '</div>';

    for (var t = 0; t < suite.tests.length; t++) {
      var test = suite.tests[t];
      try {
        // Handle both sync and async (callback-style done) tests
        var result = test.fn(function() {}); // pass no-op done
        if (result && typeof result.then === 'function') await result;

        // Also handle async tests with done callback by waiting a tick
        await new Promise(function(resolve) { setTimeout(resolve, 150); });

        totalPass++;
        html += '<div class="test pass"><span class="badge pass">PASS</span><div class="test-detail">' + test.label + '</div></div>';
      } catch (err) {
        totalFail++;
        html += '<div class="test fail"><span class="badge fail">FAIL</span><div class="test-detail">' + test.label + '<div class="err-detail">' + (err && err.message ? err.message : String(err)) + '</div></div></div>';
      }
    }

    html += '</div>';
  }

  document.getElementById('results').innerHTML = html;

  var allPass = totalFail === 0;
  document.getElementById('summary').innerHTML =
    '<div class="summary ' + (allPass ? 'all-pass' : 'has-fail') + '">' +
      '<span class="sum-chip">✓ ' + totalPass + ' passed</span>' +
      (totalFail ? '<span class="sum-chip">✗ ' + totalFail + ' failed</span>' : '') +
    '</div>';

  document.getElementById('meta').textContent =
    (totalPass + totalFail) + ' tests across ' + _suites.length + ' suites — ' +
    new Date().toLocaleTimeString();
})();
</script>

</body>
</html>
